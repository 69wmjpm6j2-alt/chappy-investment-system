name: CIS Weekly Performance

"on":
  workflow_dispatch:
  schedule:
    # 土曜 18:30 JST = 土曜 09:30 UTC
    - cron: "30 9 * * 6"

permissions:
  contents: write

jobs:
  weekly-performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests beautifulsoup4 lxml

      - name: Generate weekly performance
        id: weekly
        continue-on-error: true
        run: |
          python scripts/cis_weekly_performance.py

      - name: Commit weekly performance outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A output docs/latest
          if git diff --cached --quiet; then
            echo "No weekly performance changes."
          else
            git commit -m "Update CIS weekly performance"
            git push
          fi


      - name: Fail if weekly generation failed
        if: steps.weekly.outcome == 'failure'
        run: exit 1
